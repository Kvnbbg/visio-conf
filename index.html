    <style>
        :root {
            color-scheme: dark;
            --primary: #5b8def;
            --primary-dark: #1d3a8a;
            --accent: #22d3ee;
            --text-strong: #f8fafc;
            --card-bg: rgba(15, 23, 42, 0.78);

        }

        body {
            font-family: var(--font-sans, 'Inter', sans-serif);
            background: radial-gradient(circle at top, rgba(14, 165, 233, 0.35), transparent 45%),
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.4), transparent 55%),
                #030712;
            color: #0f172a;
        }

        .gradient-bg {
            background: transparent;
        }

        .page-wrapper {
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-shell {
            width: 100%;
            max-width: 960px;
        }

        .glass-effect {
            backdrop-filter: blur(18px);
            background: var(--card-bg);
            border: 1px solid var(--border-soft);
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.35);
        }

        .glass-panel {
            border-radius: 32px;
            padding: 2.5rem;
        }

        .hero-title {
            font-size: clamp(2.25rem, 4vw, 3.25rem);
            color: var(--text-strong);
            letter-spacing: -0.03em;
        }

        .hero-subtitle {
            color: rgba(248, 250, 252, 0.85);
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .focus-visible:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .language-button {
            transition: all 0.2s ease;
        }

        .language-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .video-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .control-button {
            transition: all 0.2s ease;
        }
        
        .control-button:hover {
            transform: scale(1.1);
        }
        
        .control-button:active {
            transform: scale(0.95);
        }

        .input-field {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.65);
            color: var(--text-strong);
        }

        .input-field::placeholder {
            color: rgba(248, 250, 252, 0.55);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.35);
        }

        .trust-badges {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .trust-badge {
            border-radius: 9999px;
            padding: 0.45rem 1.15rem;
            font-size: 0.85rem;
            color: var(--text-strong);
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(15, 23, 42, 0.6);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .feature-card {
            border-radius: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-strong);
        }

        @media (max-width: 640px) {
            .glass-panel {
                padding: 1.5rem;
                border-radius: 1.75rem;
            }

            .trust-badges {
                flex-direction: column;
                align-items: stretch;
            }

            .trust-badge {
                text-align: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>

    <!-- Main React Application -->
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        
        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }
            
            static getDerivedStateFromError(error) {
                return { hasError: true };
            }
            
            componentDidCatch(error, errorInfo) {
                console.error('Error caught by boundary:', error, errorInfo);
                document.getElementById('error-fallback').classList.remove('hidden');
            }
            
            render() {
                if (this.state.hasError) {
                    return null;
                }
                
                return this.props.children;
            }
        }
        
        // Initialize i18next
        i18next
            .use(i18nextBrowserLanguageDetector)
            .init({
                resources: translations,
                fallbackLng: 'fr',
                debug: false,
                detection: {
                    order: ['localStorage', 'navigator', 'htmlTag'],
                    caches: ['localStorage'],
                },
                interpolation: {
                    escapeValue: false,
                }
            });
        
        // Language Switcher Component
        const LanguageSwitcher = () => {
            const [currentLang, setCurrentLang] = useState(i18next.language);
            
            const languages = [
                { code: 'fr', name: 'Français', flag: '🇫🇷' },
                { code: 'en', name: 'English', flag: '🇺🇸' },
                { code: 'es', name: 'Español', flag: '🇪🇸' },
                { code: 'zh', name: '中文', flag: '🇨🇳' }
            ];
            
            const changeLanguage = (lng) => {
                i18next.changeLanguage(lng);
                setCurrentLang(lng);
                localStorage.setItem('language', lng);
                document.documentElement.lang = lng;
            };
            
            return (
                <div className="mb-6">
                    <label className="block text-sm font-medium text-white text-opacity-80 mb-3">
                        {i18next.t('language')}
                    </label>
                    <div className="flex flex-wrap gap-2">
                        {languages.map((lang) => (
                            <button
                                key={lang.code}
                                type="button"
                                onClick={() => changeLanguage(lang.code)}
                                aria-pressed={currentLang === lang.code}
                                className={`language-button px-3 py-2 text-sm rounded-md border transition-all duration-200 focus-visible ${
                                    currentLang === lang.code
                                        ? 'bg-blue-500/90 text-white border-blue-400 shadow-lg'
                                        : 'bg-white/10 text-white border-white/20 hover:bg-white/20 hover:border-white/40'
                                }`}
                                aria-label={`Switch to ${lang.name}`}
                            >
                                <span className="mr-1">{lang.flag}</span>
                                {lang.name}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };
        
        // Health Check Component
        const HealthCheck = () => {
            const [health, setHealth] = useState(null);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                const checkHealth = async () => {
                    try {
                        const response = await fetch('/api/health');
                        const data = await response.json();
                        setHealth(data);
                    } catch (error) {
                        setHealth({ status: 'error', message: 'Failed to check health' });
                    } finally {
                        setLoading(false);
                    }
                };
                
                checkHealth();
                const interval = setInterval(checkHealth, 30000);
                return () => clearInterval(interval);
            }, []);
            
            if (loading) {
                return (
                    <div className="flex items-center space-x-2 text-sm text-white opacity-75">
                        <div className="loading-spinner"></div>
                        <span>{i18next.t('loading')}</span>
                    </div>
                );
            }
            
            const isHealthy = health?.status === 'ok';
            
            return (
                <div className={`flex items-center space-x-2 text-sm ${
                    isHealthy ? 'text-green-300' : 'text-red-300'
                }`}>
                    <div className={`w-2 h-2 rounded-full ${
                        isHealthy ? 'bg-green-400 pulse' : 'bg-red-400'
                    }`}></div>
                    <span>
                        {isHealthy ? i18next.t('health_ok') : i18next.t('health_error')}
                    </span>
                </div>
            );
        };

        const TrustBadges = () => (
            <div className="trust-badges my-6" role="list" aria-label="Certifications de sécurité">
                {[
                    { icon: '🔐', label: 'Chiffrement AES-256' },
                    { icon: '🛡️', label: 'Conforme RGPD' },
                    { icon: '🌐', label: 'Infrastructure France Travail' },
                ].map((badge) => (
                    <span key={badge.label} className="trust-badge" role="listitem">
                        <span className="mr-1" aria-hidden="true">{badge.icon}</span>
                        {badge.label}
                    </span>
                ))}
            </div>
        );

        const FeatureHighlights = () => (
            <section className="mt-10">
                <h3 className="text-white text-base font-semibold mb-3">Fiabilité immédiate</h3>
                <div className="feature-grid">
                    {[{
                        icon: '⚡',
                        title: 'Connexion instantanée',
                        text: 'Optimisée pour les réseaux 4G/5G et Wi-Fi d’entreprise.'
                    }, {
                        icon: '📱',
                        title: 'Expérience mobile',
                        text: 'Interface pensée pour les écrans tactiles et la navigation à une main.'
                    }, {
                        icon: '🤝',
                        title: 'Confiance partagée',
                        text: 'Authentification France Travail et audits de sécurité TECHANDSTREAM.'
                    }].map((feature) => (
                        <article key={feature.title} className="feature-card" aria-label={feature.title}>
                            <div className="text-2xl mb-2" aria-hidden="true">{feature.icon}</div>
                            <p className="font-semibold mb-1">{feature.title}</p>
                            <p className="text-sm text-white/80 leading-relaxed">{feature.text}</p>
                        </article>
                    ))}
                </div>
            </section>
        );

        // Main App Component
        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [meetingId, setMeetingId] = useState('');
            const [userId, setUserId] = useState('');
            const [showVideoConference, setShowVideoConference] = useState(false);
            const [appConfig, setAppConfig] = useState({ demoMode: false, franceTravailEnabled: true });
            const [demoLoading, setDemoLoading] = useState(false);
            
            useEffect(() => {
                loadConfig();
                checkAuthStatus();
                // Hide loading screen after component mounts
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 1000);
            }, []);

            const loadConfig = async () => {
                try {
                    const response = await fetch('/api/config');
                    if (response.ok) {
                        const data = await response.json();
                        setAppConfig(data);
                    }
                } catch (err) {
                    console.warn('Unable to load runtime config', err);
                }
            };

            const checkAuthStatus = async () => {
                try {
                    const response = await fetch('/api/auth/status');
                    const data = await response.json();
                    
                    if (data.authenticated) {
                        setUser(data.user);
                        setUserId(data.user.id || data.user.name || 'user');
                    }
                } catch (err) {
                    console.error('Error checking auth status:', err);
                    setError(i18next.t('error_status'));
                } finally {
                    setLoading(false);
                }
            };
            
            const handleLogin = () => {
                window.location.href = '/auth/francetravail/login';
            };

            const handleDemoLogin = async () => {
                if (demoLoading) {
                    return;
                }

                setDemoLoading(true);
                setError('');

                try {
                    const response = await fetch('/api/auth/demo-login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        throw new Error('Demo login failed');
                    }

                    setUser(data.user);
                    setUserId(data.user.id || 'demo-user');
                } catch (err) {
                    console.error('Error during demo login:', err);
                    setError(i18next.t('error_demo_login'));
                } finally {
                    setDemoLoading(false);
                }
            };
            
            const handleLogout = async () => {
                try {
                    const response = await fetch('/api/auth/logout', { method: 'POST' });
                    
                    if (response.ok) {
                        setUser(null);
                        setShowVideoConference(false);
                        setMeetingId('');
                        setUserId('');
                        setError('');
                    } else {
                        throw new Error('Logout failed');
                    }
                } catch (err) {
                    console.error('Error during logout:', err);
                    setError(i18next.t('error_logout'));
                }
            };
            
            const handleJoinMeeting = () => {
                if (!meetingId.trim()) {
                    setError(i18next.t('invalid_meeting_id'));
                    return;
                }
                
                if (!userId.trim()) {
                    setError(i18next.t('invalid_user_id'));
                    return;
                }
                
                setError('');
                setShowVideoConference(true);
            };
            
            const handleLeaveMeeting = () => {
                setShowVideoConference(false);
            };
            
            const franceTravailDisabled = !appConfig.franceTravailEnabled;
            const showDemoCta = appConfig.demoMode;

            return (
                <main className="page-wrapper">
                    <div className="content-shell">
                        <header className="text-center mb-6 fade-in">
                            <p className="inline-flex items-center justify-center px-4 py-1 rounded-full text-xs tracking-widest font-semibold text-white/80 bg-white/10 border border-white/20 mb-4 uppercase">
                                TECHANDSTREAM · Confiance numérique
                            </p>
                            <h1 className="hero-title font-bold mb-3">
                                {i18next.t('welcome')}
                            </h1>
                            <p className="hero-subtitle max-w-2xl mx-auto text-base md:text-lg">
                                {i18next.t('description')}
                            </p>
                            <div className="mt-4 flex justify-center">
                                <HealthCheck />
                            </div>
                        </header>

                        <TrustBadges />

                        <div className="glass-effect glass-panel fade-in">
                            <LanguageSwitcher />

                            {error && (
                                <div className="mb-6 p-4 bg-red-500/10 border border-red-500/50 text-red-100 rounded-lg fade-in" role="alert" aria-live="assertive">
                                    <div className="flex items-center">
                                        <span className="mr-2" aria-hidden="true">⚠️</span>
                                        {error}
                                    </div>
                                </div>
                            )}

                            {loading ? (
                                <div className="text-center py-8" role="status" aria-live="polite">
                                    <div className="loading-spinner mx-auto mb-4"></div>
                                    <p className="text-white text-opacity-70">{i18next.t('loading')}</p>
                                </div>
                            ) : user ? (
                                <div className="space-y-6">
                                    <div className="p-4 bg-emerald-500/15 border border-emerald-300/40 rounded-xl fade-in">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold text-lg">
                                                {user.name ? user.name.charAt(0).toUpperCase() : 'U'}
                                            </div>
                                            <div>
                                                <p className="font-semibold text-white">
                                                    {i18next.t('welcome_user', { name: user.name || user.id })}
                                                </p>
                                                <p className="text-sm text-white/70">
                                                    {user.email || 'Authentifié'}
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {!showVideoConference ? (
                                        <div className="space-y-6">
                                            <div className="border-t border-white/10 pt-6">
                                                <h2 className="text-xl font-semibold mb-4 text-white">
                                                    {i18next.t('join_meeting')}
                                                </h2>

                                                <div className="space-y-4">
                                                    <div>
                                                        <label htmlFor="meetingId" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                            {i18next.t('meeting_id')}
                                                        </label>
                                                        <input
                                                            id="meetingId"
                                                            type="text"
                                                            value={meetingId}
                                                            onChange={(e) => setMeetingId(e.target.value)}
                                                            placeholder={i18next.t('meeting_id_placeholder')}
                                                            className="input-field"
                                                        />
                                                    </div>

                                                    <div>
                                                        <label htmlFor="userId" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                            {i18next.t('user_id')}
                                                        </label>
                                                        <input
                                                            id="userId"
                                                            type="text"
                                                            value={userId}
                                                            onChange={(e) => setUserId(e.target.value)}
                                                            placeholder={i18next.t('user_id_placeholder')}
                                                            className="input-field"
                                                        />
                                                    </div>

                                                    <button
                                                        onClick={handleJoinMeeting}
                                                        disabled={!meetingId.trim() || !userId.trim()}
                                                        className={`w-full py-3 px-4 rounded-xl font-semibold transition-all duration-200 ${
                                                            meetingId.trim() && userId.trim()
                                                                ? 'bg-gradient-to-r from-emerald-400 to-emerald-500 text-white hover:shadow-lg hover:-translate-y-0.5'
                                                                : 'bg-white/5 text-white/40 cursor-not-allowed'
                                                        }`}
                                                    >
                                                        {i18next.t('join_meeting')}
                                                    </button>
                                                </div>
                                            </div>

                                            <button
                                                onClick={handleLogout}
                                                className="w-full py-3 px-4 bg-red-500/80 text-white rounded-xl font-medium hover:bg-red-500 transition-all duration-200 hover:shadow-lg hover:-translate-y-0.5"
                                            >
                                                {i18next.t('logout_button')}
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="flex flex-wrap gap-4 items-center justify-between">
                                                <h3 className="text-lg font-semibold text-white">
                                                    {i18next.t('meeting_id')}: {meetingId}
                                                </h3>
                                                <button
                                                    onClick={handleLeaveMeeting}
                                                    className="bg-red-500/80 text-white px-4 py-2 rounded-lg hover:bg-red-500 transition-colors"
                                                >
                                                    Quitter
                                                </button>
                                            </div>

                                            <div className="video-container h-64 flex items-center justify-center">
                                                <div className="text-white text-center">
                                                    <div className="text-4xl mb-2" aria-hidden="true">📹</div>
                                                    <p>Zone de vidéoconférence</p>
                                                    <p className="text-sm text-gray-300">
                                                        Les flux vidéo ZEGOCLOUD apparaîtraient ici
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="space-y-6 text-center">
                                    <div className="p-6 rounded-2xl border border-white/20 bg-white/5">
                                        <p className="text-white text-lg">
                                            {i18next.t('description')}
                                        </p>
                                    </div>

                                    <button
                                        onClick={handleLogin}
                                        disabled={franceTravailDisabled}
                                        className={`w-full py-4 px-6 rounded-2xl font-semibold transition-all duration-200 flex items-center justify-center space-x-3 ${
                                            franceTravailDisabled
                                                ? 'bg-white/5 text-white/40 cursor-not-allowed'
                                                : 'bg-gradient-to-r from-blue-500 to-indigo-500 text-white hover:shadow-lg hover:-translate-y-0.5'
                                        }`}
                                    >
                                        <span className="text-2xl" aria-hidden="true">🏢</span>
                                        <span>{i18next.t('login_button')}</span>
                                    </button>
                                    {franceTravailDisabled && (
                                        <p className="text-sm text-yellow-200">
                                            {i18next.t('login_unavailable')}
                                        </p>
                                    )}

                                    {showDemoCta && (
                                        <div className="p-6 bg-white/5 border border-white/15 rounded-2xl text-left space-y-3">
                                            <div className="flex items-center space-x-3">
                                                <div className="text-2xl">⚡</div>
                                                <div>
                                                    <p className="text-white font-semibold">
                                                        {i18next.t('demo_login_title')}
                                                    </p>
                                                    <p className="text-white text-opacity-80 text-sm">
                                                        {i18next.t('demo_login_description')}
                                                    </p>
                                                </div>
                                            </div>
                                            <button
                                                onClick={handleDemoLogin}
                                                disabled={demoLoading}
                                                className={`w-full py-3 px-4 rounded-xl font-medium transition-all duration-200 ${
                                                    demoLoading
                                                        ? 'bg-white/10 text-white/50 cursor-wait'
                                                        : 'bg-emerald-500 text-white hover:bg-emerald-400 hover:shadow-lg hover:-translate-y-0.5'
                                                }`}
                                            >
                                                {demoLoading ? i18next.t('loading') : i18next.t('demo_login_button')}
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            <FeatureHighlights />

                            <footer className="mt-10 pt-6 border-t border-white/10 text-center text-sm text-white/80">
                                <div className="flex flex-wrap items-center justify-center gap-3 mb-4">
                                    <a href="/terms" className="hover:text-blue-200 transition-colors">
                                        {i18next.t('terms')}
                                    </a>
                                    <span className="text-white/40">•</span>
                                    <a href="/privacy" className="hover:text-blue-200 transition-colors">
                                        {i18next.t('privacy')}
                                    </a>
                                    <span className="text-white/40">•</span>
                                    <a href="/about" className="hover:text-blue-200 transition-colors">
                                        {i18next.t('about')}
                                    </a>
                                </div>
                                <p>{i18next.t('powered_by')}</p>
                                <p className="mt-1 text-white/60">{i18next.t('version')}</p>
                            </footer>
                        </div>
                    </div>
                </main>
            );
        };
        
        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
