        :root {
            color-scheme: dark;
            --primary: #5b8def;
            --primary-dark: #1d3a8a;
            --accent: #22d3ee;
            --text-strong: #f8fafc;
            --card-bg: rgba(15, 23, 42, 0.78);
            --border-soft: rgba(255, 255, 255, 0.18);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font-sans, 'Inter', sans-serif);
            background: radial-gradient(circle at top, rgba(14, 165, 233, 0.35), transparent 45%),
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.4), transparent 55%),
                #030712;
            color: #0f172a;
        }

        #root {
            width: 100vw;
            height: 100vh;
        }

        .gradient-bg {
            background: transparent;
        }

        .page-wrapper {
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-shell {
            width: 100%;
            max-width: 960px;
        }

        .glass-effect {
            backdrop-filter: blur(18px);
            background: var(--card-bg);
            border: 1px solid var(--border-soft);
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.35);
        }

        .glass-panel {
            border-radius: 32px;
            padding: 2.5rem;
        }

        .frosted-panel {
            position: relative;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(140deg, rgba(15, 23, 42, 0.88), rgba(15, 23, 42, 0.65));
            box-shadow: 0 30px 90px -40px rgba(15, 23, 42, 0.9);
            overflow: hidden;
        }

        .frosted-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 55%),
                radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.18), transparent 55%);
            opacity: 0.8;
            pointer-events: none;
        }

        .floating-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .floating-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.35);
            border-color: rgba(34, 211, 238, 0.35);
        }

        .btn-primary {
            border-radius: 9999px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(120deg, rgba(34, 197, 94, 0.9), rgba(14, 165, 233, 0.95));
            box-shadow: 0 18px 40px rgba(14, 165, 233, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 45px rgba(14, 165, 233, 0.45);
        }

        .btn-secondary {
            border-radius: 9999px;
            padding: 0.7rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.45);
            color: white;
            background: rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.18);
        }

        .hero-title {
            font-size: clamp(2.25rem, 4vw, 3.25rem);
            color: var(--text-strong);
            letter-spacing: -0.03em;
        }

        .hero-subtitle {
            color: rgba(248, 250, 252, 0.85);
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        .lucide-icon {
            width: 1.5rem;
            height: 1.5rem;
        }

        .lucide-icon.sm {
            width: 1.25rem;
            height: 1.25rem;
        }

        .lucide-icon.lg {
            width: 2rem;
            height: 2rem;
        }

        .icon-float {
            animation: icon-float 4s ease-in-out infinite;
        }

        .icon-pulse {
            animation: icon-pulse 3.2s ease-in-out infinite;
        }

        .icon-spin-slow {
            animation: icon-spin 12s linear infinite;
        }

        @keyframes icon-float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes icon-pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        @keyframes icon-spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ambient-orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(0px);
            opacity: 0.45;
            animation: float 12s ease-in-out infinite, glow 8s ease-in-out infinite;
        }

        .ambient-orb.orb-1 {
            width: 180px;
            height: 180px;
            top: -40px;
            left: -60px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.7), transparent 70%);
        }

        .ambient-orb.orb-2 {
            width: 140px;
            height: 140px;
            bottom: -20px;
            right: -30px;
            animation-delay: 1.5s;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.7), transparent 70%);
        }

        .ambient-orb.orb-3 {
            width: 120px;
            height: 120px;
            top: 40%;
            right: -60px;
            animation-delay: 2.2s;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.65), transparent 70%);
        }

        @keyframes float {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -12px, 0); }
        }

        @keyframes glow {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.7; }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .focus-visible:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .language-button {
            transition: all 0.2s ease;
        }

        .language-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .video-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .control-button {
            transition: all 0.2s ease;
        }
        
        .control-button:hover {
            transform: scale(1.1);
        }
        
        .control-button:active {
            transform: scale(0.95);
        }

        .input-field {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(15, 23, 42, 0.65);
            color: var(--text-strong);
        }

        .input-field::placeholder {
            color: rgba(248, 250, 252, 0.55);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.35);
        }

        .trust-badges {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .trust-badge {
            border-radius: 9999px;
            padding: 0.45rem 1.15rem;
            font-size: 0.85rem;
            color: var(--text-strong);
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(15, 23, 42, 0.6);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .feature-card {
            border-radius: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-strong);
        }

        .interactive-card {
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
        }

        .interactive-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.35);
            border-color: rgba(34, 211, 238, 0.35);
        }

        .interactive-card.active {
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 22px 45px rgba(16, 185, 129, 0.25);
        }

        .shine-border {
            position: relative;
            overflow: hidden;
        }

        .shine-border::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.12), transparent);
            transform: translateX(-100%);
            animation: shine 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0%, 30% { transform: translateX(-100%); opacity: 0; }
            45% { opacity: 1; }
            70%, 100% { transform: translateX(100%); opacity: 0; }
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }

        .resource-card {
            border-radius: 1.25rem;
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.16);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            color: var(--text-strong);
        }

        .resource-card a {
            align-self: flex-start;
        }

        .demo-card {
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(16, 185, 129, 0.08));
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }

        .demo-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.45);
            transform: translateY(-2px);
        }

        .demo-card.open {
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 25px 65px rgba(5, 150, 105, 0.35);
        }

        .demo-card-header {
            width: 100%;
            background: transparent;
            border: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            cursor: pointer;
        }

        .demo-card-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-strong);
            transition: color 0.3s ease;
            text-align: left;
        }

        .demo-card-header:hover .demo-card-title {
            color: var(--accent);
        }

        .demo-card-toggle {
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .demo-card:hover .demo-card-toggle {
            background: rgba(34, 211, 238, 0.3);
        }

        .demo-card.open .demo-card-toggle {
            transform: rotate(180deg);
        }

        .demo-card-content {
            padding: 0 1.5rem;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.3s ease;
        }

        .demo-card.open .demo-card-content {
            max-height: 480px;
            opacity: 1;
            padding-bottom: 1.5rem;
            padding-top: 0.5rem;
        }

        .demo-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border-radius: 9999px;
            padding: 0.35rem 0.9rem;
            background: rgba(34, 197, 94, 0.15);
            color: var(--text-strong);
            font-size: 0.85rem;
        }

        .demo-feature-list {
            display: grid;
            gap: 0.75rem;
        }

        .demo-feature-item {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            color: rgba(248, 250, 252, 0.85);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .glass-panel {
                padding: 1.5rem;
                border-radius: 1.75rem;
            }

            .trust-badges {
                flex-direction: column;
                align-items: stretch;
            }

            .trust-badge {
                text-align: center;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

            const iconRef = useRef(null);

            useEffect(() => {
                if (!iconRef.current || !window.lucide?.icons) {
                    return;
                }

                const icon = window.lucide.icons[name];

                iconRef.current.innerHTML = icon
                    ? icon.toSvg({ class: classNames('lucide-icon', className) })
                    : '';
            }, [name, className]);

            return <span ref={iconRef} aria-hidden="true"></span>;
        };
        
        // Error Boundary Component
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }
            
            static getDerivedStateFromError(error) {
                return { hasError: true };
            }
            
            componentDidCatch(error, errorInfo) {
                console.error('Error caught by boundary:', error, errorInfo);
                document.getElementById('error-fallback').classList.remove('hidden');
            }
            
            render() {
                if (this.state.hasError) {
                    return null;
                }
                
                return this.props.children;
            }
        }
        
        // Initialize i18next
        i18next
            .use(i18nextBrowserLanguageDetector)
            .init({

                fallbackLng: 'fr',
                debug: false,

                    caches: ['localStorage'],
                },
                interpolation: {
                    escapeValue: false,
                }
            });
        
        // Language Switcher Component

            const languages = [
                { code: 'fr', name: 'Français', flag: '🇫🇷' },
                { code: 'en', name: 'English', flag: '🇬🇧' }
            ];
            
            const changeLanguage = (lng) => {
                i18next.changeLanguage(lng);
                setCurrentLang(lng);
                localStorage.setItem('language', lng);
                document.documentElement.lang = lng;
            };
            
            return (
                <div className="mb-6">
                    <label className="mb-3 block text-sm font-medium text-white/80">
                        {i18next.t('language')}
                    </label>
                    <div className="flex flex-wrap gap-2">

                        ))}

                </div>
            );

        // Health Check Component

            const [health, setHealth] = useState(null);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                const checkHealth = async () => {
                    try {
                        const response = await fetch('/api/health');
                        const data = await response.json();
                        setHealth(data);
                    } catch (error) {
                        setHealth({ status: 'error', message: i18next.t('health_error_details') });
                    } finally {
                        setLoading(false);
                    }
                };
                
                checkHealth();
                const interval = setInterval(checkHealth, 30000);
                return () => clearInterval(interval);
            }, []);
            
            if (loading) {
                return (
                <div className="flex items-center space-x-2 text-sm text-white/75">
                    <div className="h-4 w-4 animate-spin rounded-full border-2 border-white/20 border-t-cyan-300"></div>
                    <span>{i18next.t('loading')}</span>
                </div>
            );
            }
            
            const isHealthy = health?.status === 'ok';
            
            return (
                <div className={`flex items-center space-x-2 text-sm ${
                    isHealthy ? 'text-emerald-300' : 'text-rose-300'

                    <div className={`h-2 w-2 rounded-full ${

                    }
                } catch (err) {
                    console.warn('Unable to load runtime config', err);
                }
            };

            const checkAuthStatus = async () => {
                try {
                    const response = await fetch('/api/auth/status');
                    const data = await response.json();

                    if (data.authenticated) {
                        setUser(data.user);
                        setUserId(data.user.id || data.user.name || 'user');
                    }
                } catch (err) {
                    console.error('Error checking auth status:', err);
                    setError(i18next.t('error_status'));
                    setInfoMessage('');
                } finally {
                    setLoading(false);
                }
            };
            
            const resetAuthFeedback = () => {
                setError('');
                setInfoMessage('');
            };

            const handleLogin = () => {
                resetAuthFeedback();
                window.location.href = '/auth/francetravail/login';
            };

            const handleDemoLogin = async () => {
                if (demoLoading) {
                    return;
                }

                setDemoLoading(true);
                resetAuthFeedback();

                try {
                    const response = await fetch('/api/auth/demo-login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    const data = await response.json();
                    if (!response.ok || !data.success) {
                        throw new Error('Demo login failed');
                    }

                    setUser(data.user);
                    setUserId(data.user.id || 'demo-user');
                } catch (err) {
                    console.error('Error during demo login:', err);
                    setError(i18next.t('error_demo_login'));
                    setInfoMessage('');
                } finally {
                    setDemoLoading(false);
                }
            };
            
            const handleLogout = async () => {
                try {
                    const response = await fetch('/api/auth/logout', { method: 'POST' });

                    if (response.ok) {
                        setUser(null);
                        setShowVideoConference(false);
                        setMeetingId('');
                        setUserId('');
                        setError('');
                        setInfoMessage('');
                    } else {
                        throw new Error('Logout failed');
                    }
                } catch (err) {
                    console.error('Error during logout:', err);
                    setError(i18next.t('error_logout'));
                    setInfoMessage('');
                }
            };

            const handleJoinMeeting = () => {
                if (!meetingId.trim()) {
                    setError(i18next.t('invalid_meeting_id'));
                    setInfoMessage('');
                    return;
                }

                if (!userId.trim()) {
                    setError(i18next.t('invalid_user_id'));
                    setInfoMessage('');
                    return;
                }

                setError('');
                setShowVideoConference(true);
            };
            
            const handleLeaveMeeting = () => {
                setShowVideoConference(false);
            };

            const handleModeChange = (mode) => {
                setAuthMode(mode);
                setInfoMessage('');
                setError('');
            };

            const handleGoogleLogin = () => {
                resetAuthFeedback();
                if (!appConfig.googleEnabled) {
                    setInfoMessage('');
                    setError(i18next.t('google_unavailable'));
                    return;
                }
                try {
                    setInfoMessage(i18next.t('google_redirect_notice'));
                    window.location.href = '/auth/google';
                } catch (err) {
                    console.error('Error launching Google sign-in:', err);
                    setInfoMessage('');
                    setError(i18next.t('google_login_error'));
                }
            };

            const handleEmailSubmit = (event) => {
                event.preventDefault();
                setError('');
                setInfoMessage('');

                if (!email.trim() || !password.trim()) {
                    setInfoMessage('');
                    setError(i18next.t('email_login_error'));
                    return;
                }

                if (authMode === 'register') {
                    if (!fullName.trim()) {
                        setError(i18next.t('name_required'));
                        return;
                    }

                    if (password !== confirmPassword) {
                        setError(i18next.t('password_mismatch'));
                        return;
                    }

                    setInfoMessage(i18next.t('registration_success', { email }));
                    setFullName('');
                    setConfirmPassword('');
                } else {
                    setInfoMessage(i18next.t('email_login_success', { email }));
                }

                setEmail('');
                setPassword('');
            };

            const handleCopyInviteLink = async () => {
                resetAuthFeedback();

                if (!meetingId.trim()) {
                    setError(i18next.t('invalid_meeting_id'));
                    return;
                }

                const url = new URL(window.location.href);
                url.searchParams.set('room', meetingId.trim());

                try {
                    if (navigator.clipboard?.writeText) {
                        await navigator.clipboard.writeText(url.toString());
                        setInfoMessage(i18next.t('invite_link_success'));
                    } else {
                        throw new Error('Clipboard unavailable');
                    }
                } catch (err) {
                    console.error('Failed to copy invite link:', err);
                    setError(i18next.t('invite_link_unavailable'));
                }
            };

            const franceTravailDisabled = !appConfig.franceTravailEnabled;
            const googleDisabled = !appConfig.googleEnabled;
            const showDemoCta = appConfig.demoMode;
            const toggleDemoCard = () => setIsDemoCardOpen((prev) => !prev);
            const isRegisterMode = authMode === 'register';
            const connectors = [
                {
                    key: 'france',
                    icon: 'landmark',
                    status: franceTravailDisabled ? 'disabled' : 'ready',
                    label: i18next.t('auth_status_france'),
                    description: i18next.t('auth_status_france_desc'),
                    tone: 'text-sky-200',
                    animation: 'icon-float'
                },
                {
                    key: 'google',
                    icon: 'link-2',
                    status: googleDisabled ? 'disabled' : 'ready',
                    label: i18next.t('auth_status_google'),
                    description: i18next.t('auth_status_google_desc'),
                    tone: 'text-emerald-200',
                    animation: 'icon-spin-slow'
                },
                {
                    key: 'email',
                    icon: 'mail',
                    status: 'ready',
                    label: i18next.t('auth_status_email'),
                    description: i18next.t('auth_status_email_desc'),
                    tone: 'text-cyan-200',
                    animation: 'icon-pulse'
                }
            ];

            const statusClasses = (status) =>
                status === 'ready'
                    ? 'text-emerald-200 bg-emerald-500/10 border border-emerald-400/40'
                    : 'text-amber-200 bg-amber-500/10 border border-amber-400/40';

            const socialLinks = [
                { key: 'twitter', icon: '𝕏', href: 'https://twitter.com/techandstream', label: i18next.t('social_twitter') },
                { key: 'linkedin', icon: 'in', href: 'https://linkedin.com/in/kevinmarville', label: i18next.t('social_linkedin') },
                { key: 'github', icon: '🐙', href: 'https://github.com/techandstream', label: i18next.t('social_github') }
            ];

            return (
                <main className="flex min-h-screen items-center justify-center px-4 py-12 sm:px-6 sm:py-16">
                    <div className="w-full max-w-5xl">
                        <header className="mb-8 space-y-4 text-center">
                            <p className="mx-auto inline-flex items-center justify-center rounded-full border border-white/20 bg-white/10 px-4 py-1 text-xs font-semibold uppercase tracking-[0.3em] text-white/80">
                                TECHANDSTREAM · Confiance numérique
                            </p>
                            <h1 className="text-[clamp(2.25rem,4vw,3.25rem)] font-bold tracking-tight text-white">
                                {i18next.t('welcome')}
                            </h1>
                            <p className="mx-auto max-w-2xl text-base text-white/80 md:text-lg">
                                {i18next.t('description')}
                            </p>
                            <div className="mt-2 flex flex-wrap justify-center gap-3">
                                <HealthCheck />
                                <div className="hidden sm:block text-white/40">•</div>
                                <span className="text-xs uppercase tracking-[0.3em] text-white/60">
                                    {i18next.t('health_check')}
                                </span>
                            </div>
                        </header>

                        <TrustBadges />

                        <div className="relative frosted-panel p-8 backdrop-blur-xl sm:p-10 shine-border">
                            <div className="pointer-events-none absolute inset-0">
                                <div className="ambient-orb orb-1"></div>
                                <div className="ambient-orb orb-2"></div>
                                <div className="ambient-orb orb-3"></div>
                            </div>
                            <div className="relative z-10">
                                <LanguageSwitcher />

                            <section className="mb-8">
                                <div className="flex items-center justify-between mb-3">
                                    <p className="text-white text-sm font-semibold tracking-wide uppercase">
                                        {i18next.t('auth_status_title')}
                                    </p>
                                </div>
                                <div className="grid gap-4 md:grid-cols-3">
                                    {connectors.map((connector) => (
                                        <article key={connector.key} className="p-4 rounded-2xl bg-white/5 border border-white/10 floating-card">
                                            <div className="flex items-center justify-between mb-3">
                                                <div className={classNames('inline-flex items-center', connector.tone)} aria-hidden="true">
                                                    <LucideIcon name={connector.icon} className={classNames('lg', connector.animation)} />
                                                </div>
                                                <span className={`px-2 py-1 rounded-full text-xs font-semibold ${statusClasses(connector.status)}`}>
                                                    {connector.status === 'ready'
                                                        ? i18next.t('auth_status_ready')
                                                        : i18next.t('auth_status_disabled')}
                                                </span>
                                            </div>
                                            <p className="text-white font-semibold">{connector.label}</p>
                                            <p className="text-white/70 text-sm leading-relaxed">{connector.description}</p>
                                        </article>
                                    ))}
                                </div>
                            </section>

                            {error && (
                                <div className="mb-6 rounded-2xl border border-red-500/50 bg-red-500/10 p-4 text-red-100 shadow-sm" role="alert" aria-live="assertive">
                                    <div className="flex items-center">
                                        <span className="mr-2" aria-hidden="true">⚠️</span>
                                        {error}
                                    </div>
                                </div>
                            )}

                            {infoMessage && (
                                <div className="mb-6 rounded-2xl border border-emerald-400/40 bg-emerald-500/10 p-4 text-emerald-100 shadow-sm" role="status" aria-live="polite">
                                    <div className="flex items-center">
                                        <span className="mr-2" aria-hidden="true">✅</span>
                                        {infoMessage}
                                    </div>
                                </div>
                            )}

                            {loading ? (
                                <div className="py-8 text-center" role="status" aria-live="polite">
                                    <div className="mx-auto mb-4 h-6 w-6 animate-spin rounded-full border-2 border-white/20 border-t-cyan-300"></div>
                                    <p className="text-white/70">{i18next.t('loading')}</p>
                                </div>
                            ) : user ? (
                                <div className="space-y-6">
                                    <div className="rounded-2xl border border-emerald-300/40 bg-emerald-500/15 p-4 shadow-sm">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white font-bold text-lg">
                                                {user.name ? user.name.charAt(0).toUpperCase() : 'U'}
                                            </div>
                                            <div>
                                                <p className="font-semibold text-white">
                                                    {i18next.t('welcome_user', { name: user.name || user.id })}
                                                </p>
                                                <p className="text-sm text-white/70">
                                                    {user.email || 'Authentifié'}
                                                </p>
                                            </div>
                                        </div>
                                    </div>

                                    {!showVideoConference ? (
                                        <div className="space-y-6">
                                            <div className="rounded-2xl border border-white/10 bg-white/5 p-6 shadow-[0_20px_50px_-35px_rgba(15,23,42,0.6)]">
                                                <h2 className="text-xl font-semibold mb-4 text-white">
                                                    {i18next.t('join_meeting')}
                                                </h2>

                                                <div className="space-y-4">
                                                    <div>
                                                        <label htmlFor="meetingId" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                            {i18next.t('meeting_id')}
                                                        </label>
                                                        <input
                                                            id="meetingId"
                                                            type="text"
                                                            value={meetingId}
                                                            onChange={(e) => setMeetingId(e.target.value)}
                                                            placeholder={i18next.t('meeting_id_placeholder')}
                                                            className={inputClassName}
                                                        />
                                                    </div>

                                                    <div>
                                                        <label htmlFor="userId" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                            {i18next.t('user_id')}
                                                        </label>
                                                        <input
                                                            id="userId"
                                                            type="text"
                                                            value={userId}
                                                            onChange={(e) => setUserId(e.target.value)}
                                                            placeholder={i18next.t('user_id_placeholder')}
                                                            className={inputClassName}
                                                        />
                                                    </div>

                                                    <button
                                                        onClick={handleJoinMeeting}
                                                        disabled={!meetingId.trim() || !userId.trim()}
                                                        className={classNames(
                                                            primaryActionClass,
                                                            meetingId.trim() && userId.trim()
                                                                ? 'btn-primary'
                                                                : 'bg-white/5 text-white/40 cursor-not-allowed'
                                                        )}
                                                    >
                                                        {i18next.t('join_meeting')}
                                                    </button>

                                                    <button
                                                        onClick={handleCopyInviteLink}
                                                        disabled={!meetingId.trim()}
                                                        className={classNames(
                                                            primaryActionClass,
                                                            meetingId.trim()
                                                                ? 'btn-secondary'
                                                                : 'bg-white/5 text-white/40 cursor-not-allowed'
                                                        )}
                                                    >
                                                        {i18next.t('invite_link_button')}
                                                    </button>
                                                </div>
                                            </div>

                                            <button
                                                onClick={handleLogout}
                                                className={classNames(
                                                    primaryActionClass,
                                                    'bg-red-500/80 text-white font-medium hover:bg-red-500 hover:shadow-lg hover:-translate-y-0.5'
                                                )}
                                            >
                                                {i18next.t('logout_button')}
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="flex flex-wrap gap-4 items-center justify-between">
                                                <h3 className="text-lg font-semibold text-white">
                                                    {i18next.t('meeting_id')}: {meetingId}
                                                </h3>
                                                <button
                                                    onClick={handleLeaveMeeting}
                                                    className="rounded-full bg-red-500/80 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-500 hover:shadow-lg"
                                                >
                                                    Quitter
                                                </button>
                                            </div>

                                            <div className="flex h-64 items-center justify-center rounded-xl bg-black/80">
                                                <div className="text-center text-white">
                                                    <div className="mb-2 text-4xl" aria-hidden="true">📹</div>
                                                    <p>Zone de vidéoconférence</p>
                                                    <p className="text-sm text-white/70">
                                                        Les flux OxyLayer apparaîtront ici
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="space-y-8">
                                    <div className="rounded-2xl border border-white/15 bg-white/5 p-6 text-center floating-card">
                                        <p className="text-white text-lg">
                                            {i18next.t('description')}
                                        </p>
                                    </div>

                                    <div className="grid gap-4 md:grid-cols-2">
                                        <button
                                            onClick={handleLogin}
                                            disabled={franceTravailDisabled}
                                            className={`w-full py-4 px-6 rounded-2xl font-semibold transition-all duration-200 flex items-center justify-center space-x-3 ${
                                                franceTravailDisabled
                                                    ? 'bg-white/5 text-white/40 cursor-not-allowed'
                                                    : 'bg-gradient-to-r from-blue-500 to-indigo-500 text-white hover:shadow-xl hover:-translate-y-1'
                                            }`}
                                            aria-label={i18next.t('login_button')}
                                        >
                                            <span className="text-2xl" aria-hidden="true">🏢</span>
                                            <span>{i18next.t('login_button')}</span>
                                        </button>

                                        <button
                                            onClick={handleGoogleLogin}
                                            disabled={googleDisabled}
                                            className={`w-full py-4 px-6 rounded-2xl font-semibold transition-all duration-200 flex items-center justify-center space-x-3 ${
                                                googleDisabled
                                                    ? 'bg-white/5 text-white/40 cursor-not-allowed'
                                                    : 'bg-white text-gray-900 hover:shadow-xl hover:-translate-y-1'
                                            }`}
                                            aria-label={i18next.t('google_login_button')}
                                        >
                                            <span className="text-2xl" aria-hidden="true">🔒</span>
                                            <span>{i18next.t('google_login_button')}</span>
                                        </button>
                                        {googleDisabled && (
                                            <p className="text-xs text-yellow-200 text-center md:col-span-2">
                                                {i18next.t('google_unavailable')}
                                            </p>
                                        )}
                                    </div>
                                    {franceTravailDisabled && (
                                        <p className="text-sm text-yellow-200 text-center">
                                            {i18next.t('login_unavailable')}
                                        </p>
                                    )}

                                    <div className="flex items-center justify-center text-white/40 text-xs uppercase tracking-[0.3em]">
                                        {i18next.t('divider_or')}
                                    </div>

                                    <div className="p-6 bg-white/5 border border-white/15 rounded-2xl floating-card">
                                        <div className="flex flex-wrap gap-2 mb-4" role="tablist" aria-label={i18next.t('auth_section_title')}>
                                            <button
                                                type="button"
                                                onClick={() => handleModeChange('login')}
                                                aria-pressed={!isRegisterMode}
                                                className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${
                                                    !isRegisterMode
                                                        ? 'bg-emerald-500 text-white shadow-lg'
                                                        : 'bg-white/10 text-white/70'
                                                }`}
                                            >
                                                {i18next.t('cta_normal_login')}
                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => handleModeChange('register')}
                                                aria-pressed={isRegisterMode}
                                                className={`px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 ${
                                                    isRegisterMode
                                                        ? 'bg-emerald-500 text-white shadow-lg'
                                                        : 'bg-white/10 text-white/70'
                                                }`}
                                            >
                                                {i18next.t('cta_register')}
                                            </button>
                                        </div>

                                        <form className="space-y-4" onSubmit={handleEmailSubmit}>
                                            {isRegisterMode && (
                                                <div>
                                                    <label htmlFor="fullName" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                        {i18next.t('name_label')}
                                                    </label>
                                                    <input
                                                        id="fullName"
                                                        type="text"
                                                        value={fullName}
                                                        onChange={(e) => setFullName(e.target.value)}
                                                        className={inputClassName}
                                                    />
                                                </div>
                                            )}

                                            <div>
                                                <label htmlFor="email" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                    {i18next.t('email_label')}
                                                </label>
                                                    <input
                                                        id="email"
                                                        type="email"
                                                        value={email}
                                                        onChange={(e) => setEmail(e.target.value)}
                                                        className={inputClassName}
                                                        required
                                                    />
                                            </div>

                                            <div>
                                                <label htmlFor="password" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                    {i18next.t('password_label')}
                                                </label>
                                                    <input
                                                        id="password"
                                                        type="password"
                                                        value={password}
                                                        onChange={(e) => setPassword(e.target.value)}
                                                        className={inputClassName}
                                                        required
                                                    />
                                            </div>

                                            {isRegisterMode && (
                                                <div>
                                                    <label htmlFor="confirmPassword" className="block text-sm font-medium text-white text-opacity-80 mb-2">
                                                        {i18next.t('confirm_password_label')}
                                                    </label>
                                                    <input
                                                        id="confirmPassword"
                                                        type="password"
                                                        value={confirmPassword}
                                                        onChange={(e) => setConfirmPassword(e.target.value)}
                                                        className={inputClassName}
                                                        required
                                                    />
                                                </div>
                                            )}

                                            <button
                                                type="submit"
                                                className={classNames(
                                                    primaryActionClass,
                                                    'bg-gradient-to-r from-emerald-400 to-emerald-500 text-white hover:shadow-lg hover:-translate-y-0.5'
                                                )}
                                            >
                                                {isRegisterMode ? i18next.t('register_button') : i18next.t('email_login_button')}
                                            </button>
                                        </form>
                                        <p className="text-xs text-white/60 mt-3">{i18next.t('form_disclaimer')}</p>
                                        <button
                                            type="button"
                                            onClick={() => handleModeChange(isRegisterMode ? 'login' : 'register')}
                                            className="mt-3 text-sm text-blue-200 hover:underline"
                                        >
                                            {isRegisterMode ? i18next.t('switch_to_login') : i18next.t('switch_to_register')}
                                        </button>
                                    </div>

                                    {showDemoCta && (
                                        <div
                                            className={`overflow-hidden rounded-3xl border border-white/15 bg-gradient-to-br from-blue-500/10 to-emerald-500/10 transition-all duration-300 hover:-translate-y-0.5 hover:border-white/30 hover:shadow-[0_18px_45px_rgba(15,23,42,0.45)] ${
                                                isDemoCardOpen ? 'border-emerald-400/40 shadow-[0_25px_65px_rgba(5,150,105,0.35)]' : ''
                                            }`}
                                            data-state={isDemoCardOpen ? 'open' : 'closed'}
                                        >
                                            <button
                                                type="button"
                                                onClick={toggleDemoCard}
                                                className="flex w-full items-center justify-between border-none bg-transparent px-6 py-5 text-left focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/80"
                                                aria-expanded={isDemoCardOpen}
                                                aria-controls="demo-session-panel"
                                            >
                                                <div className="flex items-center gap-3 text-base font-semibold text-white">
                                                    <span className="inline-flex items-center text-amber-200" aria-hidden="true">
                                                        <LucideIcon name="zap" className="lg icon-pulse" />
                                                    </span>
                                                    <div>
                                                        <p>{i18next.t('demo_login_title')}</p>
                                                        <p className="hidden text-sm text-white/80 sm:block">
                                                            {i18next.t('demo_login_description')}
                                                        </p>
                                                    </div>
                                                </div>
                                                <div
                                                    className={`flex h-8 w-8 items-center justify-center rounded-full bg-white/15 transition-all ${
                                                        isDemoCardOpen ? 'rotate-180 bg-cyan-400/30' : ''
                                                    }`}
                                                    aria-hidden="true"
                                                >
                                                    <svg className="w-4 h-4 text-white/80" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                                        <path d="M5 8l5 5 5-5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
                                                    </svg>
                                                </div>
                                            </button>
                                            <div
                                                id="demo-session-panel"
                                                className={`overflow-hidden px-6 transition-all duration-300 ${
                                                    isDemoCardOpen ? 'max-h-[480px] opacity-100 pb-6 pt-2' : 'max-h-0 opacity-0'
                                                }`}
                                                aria-hidden={!isDemoCardOpen}
                                            >
                                                <p className="mb-4 text-sm text-white/80 sm:hidden">
                                                    {i18next.t('demo_login_description')}
                                                </p>
                                                <div className="flex flex-wrap gap-2 mb-4">
                                                    <span className="inline-flex items-center gap-2 rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-medium text-white">
                                                        <span className="text-emerald-200" aria-hidden="true">
                                                            <LucideIcon name="rocket" className="sm icon-float" />
                                                        </span>
                                                        {i18next.t('demo_login_pill_speed')}
                                                    </span>
                                                    <span className="inline-flex items-center gap-2 rounded-full bg-emerald-500/15 px-3 py-1 text-xs font-medium text-white">
                                                        <span className="text-emerald-200" aria-hidden="true">
                                                            <LucideIcon name="shield-check" className="sm icon-pulse" />
                                                        </span>

        // Render the app

        root.render(
